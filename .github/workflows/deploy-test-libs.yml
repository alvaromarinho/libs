name: Deploy Test Libs

on:
  push:
    branches: [master]
    paths: ['projects/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/pessoal/libs
            git fetch --prune origin && git reset --hard origin/master
            git pull origin master
            npm install --legacy-peer-deps
            npx ng build ng-bs-calendar --configuration production
            npx ng build ng-bs-modal-service --configuration production
            npx ng build ng-bs-toast-service --configuration production
            npx ng build ng-collapse --configuration production
            npx ng build ng-dd-file --configuration production
            npx ng build ng-generate-table --configuration production
            npx ng build test-libs --configuration production
            rm -rf node_modules src
            systemctl reload nginx